name: Twice-Daily Scrape (Tinbids)

on:
  schedule:
    # Twice a day, ~12h apart, so short-lived auctions get seen live before they
    # end. The scraper retries internally if blocked, and the guard keeps a
    # blocked run from wiping data. Minutes off :00 to dodge GitHub congestion.
    - cron: "23 17 * * *"  # ~1pm ET
    - cron: "23 5 * * *"   # ~1am ET
  workflow_dispatch:       # allows manual run from GitHub website

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml requests

      - name: Run scraper
        run: python scrape_tinbids.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/products_tinbids.json
          git diff --cached --quiet || git commit -m "Daily Tinbids scrape $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
