name: Backfill Speak-Easy first-post dates (one-off)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml requests

      - name: Run backfill
        env:
          SPEAKEASY_USERNAME: ${{ secrets.SPEAKEASY_USERNAME }}
          SPEAKEASY_PASSWORD: ${{ secrets.SPEAKEASY_PASSWORD }}
        run: python backfill_speakeasy_dates.py

      - name: Commit and clean up
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/backfill_speakeasy_dates.yml
          git rm backfill_speakeasy_dates.py
          git add docs/products_speakeasy.json
          git commit -m "Backfill Speak-Easy first_seen to thread post dates"
          git push
